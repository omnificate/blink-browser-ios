name: BlinkBrowser
options:
  bundleIdPrefix: com.blink
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  BlinkBrowser:
    type: application
    platform: iOS
    sources:
      - path: BlinkBrowser
    settings:
      base:
        INFOPLIST_FILE: BlinkBrowser/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blink.browser
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: ""
