name: BlinkBrowser
options:
  bundleIdPrefix: com.blink
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  BlinkBrowser:
    type: application
    platform: iOS
    sources:
      - BlinkBrowser
    settings:
      base:
        INFOPLIST_FILE: BlinkBrowser/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.blink.browser
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: BlinkBrowser/BlinkBrowser.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.blink.browser
