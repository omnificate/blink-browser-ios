name: Build REAL Chromium Blink Browser for iOS
on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Build target'
        required: true
        default: 'content_shell'
        type: choice
        options:
          - content_shell
          - Chromium
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-chromium-blink:
    runs-on: macos-14
    timeout-minutes: 360
    env:
      DEPOT_TOOLS_UPDATE: 0
      CHROMIUM_BUILDTOOLS_PATH: ${{ github.workspace }}/chromium/src/buildtools

    steps:
      - name: Disk Space (Before Cleanup)
        run: df -h /

      - name: Free Disk Space
        run: |
          echo "=== Removing iOS/watchOS/tvOS/visionOS simulators ==="
          sudo rm -rf ~/Library/Developer/CoreSimulator/Devices/* 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/iOS\ 1[0-6]* 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/watchOS* 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/tvOS* 2>/dev/null || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/xrOS* 2>/dev/null || true

          echo "=== Removing .NET, Android, Haskell ==="
          sudo rm -rf /usr/local/share/dotnet 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          sudo rm -rf /opt/ghc 2>/dev/null || true
          sudo rm -rf /usr/local/share/boost 2>/dev/null || true

          echo "=== Removing old Xcode versions (keep latest) ==="
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Keeping: $LATEST_XCODE"
          for xc in /Applications/Xcode*.app; do
            if [ "$xc" != "$LATEST_XCODE" ]; then
              echo "Removing: $xc"
              sudo rm -rf "$xc" 2>/dev/null || true
            fi
          done

          echo "=== Cleanup caches ==="
          sudo rm -rf ~/Library/Caches/Homebrew 2>/dev/null || true
          brew cleanup --prune=all 2>/dev/null || true

      - name: Disk Space (After Cleanup)
        run: df -h /

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Install depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Create .gclient config
        run: |
          mkdir -p chromium
          cd chromium
          cat > .gclient << 'GCLIENT_EOF'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ["ios"]
          target_os_only = True
          GCLIENT_EOF
          cat .gclient

      - name: Fetch Chromium Source (shallow)
        run: |
          cd chromium
          echo "=== Starting gclient sync (this takes 20-40 min) ==="
          gclient sync --no-history --nohooks -j8 --shallow
          echo "=== Source fetched ==="
          df -h /

      - name: Run Hooks
        run: |
          cd chromium/src
          gclient runhooks
          echo "=== Hooks complete ==="
          df -h /

      - name: Configure GN Build (Blink Enabled)
        run: |
          cd chromium/src
          BUILD_DIR="out/${{ inputs.build_type }}-iphoneos"
          IS_DEBUG=$( [ "${{ inputs.build_type }}" = "Debug" ] && echo "true" || echo "false" )

          gn gen "$BUILD_DIR" --args="
            target_os = \"ios\"
            target_cpu = \"arm64\"
            use_blink = true
            is_debug = $IS_DEBUG
            ios_enable_code_signing = false
            enable_nacl = false
            symbol_level = 0
            blink_symbol_level = 0
            enable_dsyms = false
            treat_warnings_as_errors = false
            ios_content_shell_bundle_identifier = \"com.blink.browser.content-shell\"
          "

          echo "=== GN args ==="
          gn args "$BUILD_DIR" --list --short | head -30
          echo "=== Configuration complete ==="

      - name: Build ${{ inputs.build_target }} with Blink Engine
        run: |
          cd chromium/src
          BUILD_DIR="out/${{ inputs.build_type }}-iphoneos"
          echo "=== Building ${{ inputs.build_target }} (this takes 1-3 hours) ==="
          echo "Start time: $(date)"
          autoninja -C "$BUILD_DIR" ${{ inputs.build_target }}
          echo "End time: $(date)"
          echo "=== Build complete ==="
          echo "=== Output apps ==="
          find "$BUILD_DIR" -name "*.app" -type d -maxdepth 2
          df -h /

      - name: Package IPA
        run: |
          cd chromium/src
          BUILD_DIR="out/${{ inputs.build_type }}-iphoneos"

          # Find the built .app
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" -type d -maxdepth 2 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found! Listing build dir:"
            ls -la "$BUILD_DIR/"
            find "$BUILD_DIR" -name "*.app" -o -name "content_shell*" -o -name "Chromium*" | head -20
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH" .app)
          echo "Found app: $APP_PATH ($APP_NAME)"

          # Create Payload structure
          mkdir -p /tmp/ipa/Payload
          cp -r "$APP_PATH" /tmp/ipa/Payload/

          # Create IPA
          cd /tmp/ipa
          zip -r "/tmp/BlinkBrowser-${APP_NAME}.ipa" Payload/
          echo "IPA created: $(du -h /tmp/BlinkBrowser-${APP_NAME}.ipa | cut -f1)"

          # Create TIPA (TrollStore) - same format, different extension
          cp "/tmp/BlinkBrowser-${APP_NAME}.ipa" "/tmp/BlinkBrowser-${APP_NAME}.tipa"
          echo "TIPA created: $(du -h /tmp/BlinkBrowser-${APP_NAME}.tipa | cut -f1)"

          # Store name for artifact upload
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV

      - name: Upload IPA (Blink Engine)
        uses: actions/upload-artifact@v4
        with:
          name: BlinkBrowser-REAL-BLINK-IPA
          path: /tmp/BlinkBrowser-*.ipa

      - name: Upload TIPA (TrollStore - Blink Engine)
        uses: actions/upload-artifact@v4
        with:
          name: BlinkBrowser-REAL-BLINK-TIPA
          path: /tmp/BlinkBrowser-*.tipa

      - name: Build Summary
        if: always()
        run: |
          echo "## Chromium Blink Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ inputs.build_target }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: ${{ inputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Engine**: Chromium Blink (NOT WebKit)" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: arm64 (Apple Silicon / A-series)" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Signing**: Unsigned (TrollStore compatible)" >> $GITHUB_STEP_SUMMARY
          df -h / >> $GITHUB_STEP_SUMMARY
